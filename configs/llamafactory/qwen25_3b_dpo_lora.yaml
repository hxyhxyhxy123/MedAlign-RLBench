### model
model_name_or_path: Qwen/Qwen2.5-3B-Instruct
adapter_name_or_path: /root/autodl-tmp/qwen-med-runs/general-med-lora
trust_remote_code: true
flash_attn: auto

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
pref_beta: 0.1
pref_loss: sigmoid

### dataset
dataset_dir: /root/autodl-tmp/qwen-med-align-auto/data/llamafactory
dataset: stage1_med_dpo_train
template: qwen
cutoff_len: 2048
max_samples: 25000
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: /root/autodl-tmp/qwen-med-runs/general-med-dpo-lora
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
